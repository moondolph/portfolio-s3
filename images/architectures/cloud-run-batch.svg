<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">JCB batch platform migration: JP1/AJS3 to Cloud Run Jobs</title>
  <desc id="desc">JP1/AJS3 Manager dispatches a jobnet to the Agent, which runs a wrapper shell that calls gcloud to execute Cloud Run Jobs. Cloud Run Jobs pulls its container image from Artifact Registry, writes structured logs to Cloud Logging, and returns an exit code to the wrapper shell so JP1 can record success or failure. Artifact Registry is kept current by a GitLab CI/CD pipeline that builds and pushes the image on every commit to the job repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b0f14"/><stop offset="1" stop-color="#12243a"/></linearGradient>
    <linearGradient id="gcp" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#4285f4"/><stop offset="1" stop-color="#6ee7f9"/></linearGradient>
    <linearGradient id="gitlab" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fc6d26"/><stop offset="1" stop-color="#fca326"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>

  <rect width="1200" height="820" rx="34" fill="url(#bg)"/>
  <text x="60" y="76" fill="#fff" font-family="Inter, Arial" font-size="32" font-weight="800">JCB Batch Platform Migration</text>
  <text x="60" y="106" fill="rgba(255,255,255,.66)" font-family="Inter, Arial" font-size="16">JP1/AJS3 dispatch → containerized execution on Cloud Run Jobs → structured logging &amp; exit-code handoff</text>

  <!-- Band labels -->
  <g font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600" letter-spacing="1.5" fill="rgba(255,255,255,.4)">
    <text x="60" y="168">TRIGGER &amp; DISPATCH — ON-PREM VM (JP1/AJS3)</text>
    <text x="60" y="398">EXECUTION &amp; OBSERVABILITY — GOOGLE CLOUD</text>
    <text x="60" y="628">BUILD &amp; DEPLOY — GITLAB CI/CD</text>
  </g>

  <!-- Band A: Trigger -->
  <rect x="40" y="184" width="1120" height="130" rx="20" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.10)" stroke-dasharray="5 7"/>
  <g font-family="Inter, Arial" font-weight="700" font-size="18" filter="url(#shadow)">
    <rect x="80" y="209" width="220" height="80" rx="16" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="100" y="245" fill="#fff">JP1/AJS3 Manager</text><text x="100" y="269" fill="rgba(255,255,255,.6)" font-size="13" font-weight="500">Schedules the jobnet</text>

    <rect x="360" y="209" width="220" height="80" rx="16" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="380" y="245" fill="#fff">JP1/AJS3 Agent</text><text x="380" y="269" fill="rgba(255,255,255,.6)" font-size="13" font-weight="500">Executes on the job host</text>

    <rect x="640" y="209" width="220" height="80" rx="16" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="660" y="245" fill="#fff">Wrapper Shell</text><text x="660" y="269" fill="rgba(255,255,255,.6)" font-size="13" font-weight="500">gcloud run jobs execute --wait</text>
  </g>

  <!-- Band B: Execution -->
  <rect x="40" y="414" width="1120" height="130" rx="20" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.10)" stroke-dasharray="5 7"/>
  <g font-family="Inter, Arial" font-weight="700" font-size="18" filter="url(#shadow)">
    <rect x="360" y="439" width="220" height="80" rx="16" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="380" y="475" fill="#fff">Artifact Registry</text><text x="380" y="499" fill="rgba(255,255,255,.6)" font-size="13" font-weight="500">Versioned container images</text>

    <rect x="640" y="439" width="220" height="80" rx="16" fill="url(#gcp)"/>
    <text x="660" y="475" fill="#06121f">Cloud Run Jobs</text><text x="660" y="499" fill="#06121f" font-size="13" font-weight="600">Container batch execution</text>

    <rect x="920" y="439" width="200" height="80" rx="16" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="940" y="475" fill="#fff">Cloud Logging</text><text x="940" y="499" fill="rgba(255,255,255,.6)" font-size="13" font-weight="500">Structured run logs</text>
  </g>

  <!-- Band C: CI/CD -->
  <rect x="40" y="644" width="1120" height="130" rx="20" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.10)" stroke-dasharray="5 7"/>
  <g font-family="Inter, Arial" font-weight="700" font-size="18" filter="url(#shadow)">
    <rect x="80" y="669" width="220" height="80" rx="16" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="100" y="705" fill="#fff">GitLab Repository</text><text x="100" y="729" fill="rgba(255,255,255,.6)" font-size="13" font-weight="500">Job source code</text>

    <rect x="360" y="669" width="220" height="80" rx="16" fill="url(#gitlab)"/>
    <text x="380" y="705" fill="#20120a">GitLab CI/CD</text><text x="380" y="729" fill="#20120a" font-size="13" font-weight="600">Build &amp; push image</text>
  </g>

  <!-- Arrows -->
  <g stroke="#8ab4ff" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 249H360"/>
    <path d="M580 249H640"/>
    <path d="M730 289V439"/>
    <path d="M580 479H640"/>
    <path d="M860 479H920"/>
  </g>
  <g stroke="#8ab4ff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 8" opacity=".85">
    <path d="M790 439V289"/>
  </g>
  <g stroke="#ffbd7a" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 709H360"/>
    <path d="M470 669V519"/>
  </g>

  <g fill="#8ab4ff" font-family="Inter, Arial" font-size="14" font-weight="700">
    <text x="330" y="238" text-anchor="middle">dispatch</text>
    <text x="610" y="238" text-anchor="middle">run</text>
    <text x="748" y="370" text-anchor="start">execute</text>
    <text x="770" y="370" text-anchor="end">exit code</text>
    <text x="610" y="468" text-anchor="middle">pull image</text>
    <text x="890" y="468" text-anchor="middle">logs</text>
  </g>
  <g fill="#ffbd7a" font-family="Inter, Arial" font-size="14" font-weight="700">
    <text x="330" y="698" text-anchor="middle">on commit</text>
    <text x="495" y="600" text-anchor="start">build &amp; push</text>
  </g>

</svg>
