<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Public system operation support architecture</title>
  <desc id="desc">Operator uses tools to inspect logs, application server, Oracle database, and batch output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b0f14"/><stop offset="1" stop-color="#06272b"/></linearGradient>
    <linearGradient id="ops" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06b6d4"/><stop offset="1" stop-color="#67e8f9"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <text x="60" y="82" fill="#fff" font-family="Inter, Arial" font-size="34" font-weight="800">Oracle / Linux Operation Support</text>
  <text x="60" y="120" fill="rgba(255,255,255,.68)" font-family="Inter, Arial" font-size="18">Logs → SQL investigation → batch/account/output issue triage</text>
  <g font-family="Inter, Arial" font-weight="700" font-size="20" text-anchor="middle" filter="url(#shadow)">
    <rect x="70" y="292" width="190" height="96" rx="18" fill="url(#ops)"/>
    <text x="165" y="334" fill="#031316">Engineer</text><text x="165" y="363" fill="#031316" font-size="14">Initial investigation</text>
    <rect x="330" y="200" width="190" height="92" rx="18" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="425" y="238" fill="#fff">TeraTerm</text><text x="425" y="266" fill="rgba(255,255,255,.6)" font-size="14">Linux access</text>
    <rect x="330" y="388" width="190" height="92" rx="18" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="425" y="426" fill="#fff">SQL Tools</text><text x="425" y="454" fill="rgba(255,255,255,.6)" font-size="14">Oracle check</text>
    <rect x="600" y="200" width="210" height="92" rx="18" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="705" y="238" fill="#fff">App / Batch Server</text><text x="705" y="266" fill="rgba(255,255,255,.6)" font-size="14">logs / status</text>
    <rect x="600" y="388" width="210" height="92" rx="18" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="705" y="426" fill="#fff">Oracle DB</text><text x="705" y="454" fill="rgba(255,255,255,.6)" font-size="14">tables / sequences</text>
    <rect x="900" y="292" width="220" height="96" rx="18" fill="#111827" stroke="rgba(255,255,255,.18)"/>
    <text x="1010" y="334" fill="#fff">Report / Escalate</text><text x="1010" y="363" fill="rgba(255,255,255,.6)" font-size="14">root cause notes</text>
  </g>
  <g stroke="#67e8f9" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 330C300 280 300 246 330 246"/><path d="M260 350C300 400 300 434 330 434"/><path d="M520 246H600"/><path d="M520 434H600"/><path d="M810 246C870 260 880 320 900 330"/><path d="M810 434C870 420 880 360 900 350"/>
  </g>
  <rect x="60" y="585" width="1080" height="70" rx="18" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.1)"/>
  <text x="90" y="628" fill="rgba(255,255,255,.78)" font-family="Inter, Arial" font-size="18">Design focus: production-like investigation workflow, SQL-based evidence gathering, and clear handoff documentation.</text>
</svg>
